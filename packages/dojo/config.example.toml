# Dojo Configuration
# Generated by `dojo init` at ~/.config/dojo/config.toml
# Or copy this file manually.

[paths]
# Where domain state files are stored
data = "~/.local/share/dojo"
# Temp files and cache
cache = "~/.cache/dojo"

[fsrs]
# Target recall probability (0.0-1.0). Higher = more frequent reviews.
request_retention = 0.9
# Maximum days between reviews
maximum_interval = 36500
# Add slight randomization to review timing (prevents review clustering)
enable_fuzz = true
# Steps for new cards in learning phase
learning_steps = ["1m", "10m"]
# Steps for relearning forgotten cards
relearning_steps = ["10m"]

[session]
# Target session length (informational — not enforced)
target_duration_minutes = 15
# Max new/due concepts per session
concepts_per_session = 3
# Days without a session before domain is considered "stale"
staleness_threshold_days = 7

[lore]
# Capture session summaries to Lore on exit (requires lore CLI)
capture_on_exit = true
